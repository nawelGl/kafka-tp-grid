apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: mono-pool
  namespace: kafka
  labels:
    strimzi.io/cluster: mon-cluster
spec:
  replicas: 1
  roles:
    - controller
    - broker
  storage:
    type: ephemeral

---
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: mon-cluster
  namespace: kafka
  annotations:
    strimzi.io/node-pools: "enabled"
    strimzi.io/kraft: "enabled"
spec:
  kafka:
    version: 4.2.0
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: externe
        port: 9094
        type: nodeport
        tls: false
        configuration:
          brokers:
            - broker: 0
              advertisedHost: 127.0.0.1
  entityOperator:
    topicOperator: {}
    userOperator: {}